              - /url: "#build-hooks-1"
              - text: "#"
          - paragraph [ref=f2e1346]: Build hooks let you run custom code at specific points in the electron-builder build lifecycle. Use them to modify the app bundle, perform additional signing, upload symbols, or integrate with external services.
          - heading "Build LifecycleDirect link to Build Lifecycle" [level=2] [ref=f2e1347]:
            - text: Build Lifecycle
            - link "Direct link to Build Lifecycle" [ref=f2e1348] [cursor=pointer]:
              - /url: "#build-lifecycle"
              - text: "#"
          - paragraph [ref=f2e1349]: Hooks fire in this order during every build. Pick the hook that runs at the right stage for your task — modifying app files before signing, triggering external tools after all artifacts are ready, etc.
          - paragraph [ref=f2e1350]:
            - text: "| Hook | When it fires | Common use | |---|---|---| |"
            - code [ref=f2e1351]: beforeBuild
            - text: "| Before native deps are installed/rebuilt | Skip or customize native module rebuild | |"
            - code [ref=f2e1352]: beforePack
            - text: "| Before files are copied into the app bundle | Inject generated files, modify source before pack | |"
            - code [ref=f2e1353]: afterExtract
            - text: "| After Electron binary is extracted | Modify the Electron binary or its resources | |"
            - code [ref=f2e1354]: afterPack
            - text: "| After files are packaged,"
            - strong [ref=f2e1355]: before signing
            - text: "| Modify app bundle structure, add unpacked files | |"
            - code [ref=f2e1356]: afterSign
            - text: "| After signing,"
            - strong [ref=f2e1357]: before distributable is created
            - text: "| Custom post-sign steps, extra notarization workflows | |"
            - code [ref=f2e1358]: artifactBuildStarted
            - text: "| When each installer/image starts building | Per-artifact logging or tracking | |"
            - code [ref=f2e1359]: artifactBuildCompleted
            - text: "| When each installer/image finishes | Checksum capture, per-artifact upload | |"
            - code [ref=f2e1360]: afterAllArtifactBuild
            - text: "| After"
            - strong [ref=f2e1361]: all
            - text: artifacts are done | Upload debug symbols, generate changelogs, return extra publish paths |
          - paragraph [ref=f2e1362]: Hook execution is serial within each platform/arch combination. Async hooks are awaited before the build proceeds.
          - paragraph [ref=f2e1363]:
            - strong [ref=f2e1364]: Target-specific hooks
            - text: "(only fire for their respective target):"
