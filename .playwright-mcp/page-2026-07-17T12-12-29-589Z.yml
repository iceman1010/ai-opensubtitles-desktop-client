              - text: — supply a custom Electron binary
            - listitem [ref=f2e1368]:
              - code [ref=f2e1369]: msiProjectCreated
              - text: — edit WiX XML before MSI compilation
            - listitem [ref=f2e1370]:
              - code [ref=f2e1371]: appxManifestCreated
              - text: — edit AppX manifest XML before packaging
            - listitem [ref=f2e1372]:
